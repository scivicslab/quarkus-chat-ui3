<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat UI3</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- chat-ui stylesheet first (pristine), then the shell overrides/additions. -->
    <link rel="stylesheet" href="styles.css?v=31">
    <link rel="stylesheet" href="console.css?v=29">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX: render LaTeX math in the left-pane chat (assistant answers). -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.4/lib/index.umd.js"></script>
</head>
<body>
    <!--
      Single-DOM two-pane console (exdb2-style).
        - #left-panel  : the chat-ui screen, embedded inline and unchanged.
        - #splitter    : draggable divider.
        - #right-panel : tabbed workspace for features built on top (Logs; more later).
      Everything from chat-ui's original <body> is kept verbatim inside #left-panel so app.js
      finds every element id it expects.
    -->
    <!-- Global header spanning both panes: app-wide controls (title, theme, the effective model, status). -->
    <div id="app-header">
        <h1 id="app-title">Chat UI3</h1>
        <label id="theme-label">Theme:
            <select id="theme-select">
                <option value="dark-catppuccin">Dark Catppuccin</option>
                <option value="dark-nord">Dark Nord</option>
                <option value="dark-blue">Dark Blue</option>
                <option value="dark-green">Dark Green</option>
                <option value="dark-red">Dark Red</option>
                <option value="light-clean">Light Clean</option>
                <option value="light-warm">Light Warm</option>
                <option value="light-blue">Light Blue</option>
                <option value="light-green">Light Green</option>
                <option value="light-red">Light Red</option>
            </select>
        </label>
        <label id="hdr-model-label" title="Model used for requests (sets the server default via /api/config)">Model:
            <select id="cfg-model"></select>
        </label>
        <label title="Sampling temperature. Lower (0–0.2) for code/deterministic, higher for varied prose.">Temp
            <input id="cfg-temp" type="number" min="0" max="2" step="0.1"></label>
        <label title="Max tokens for the model's REPLY (output length) — not the context window.">Max&nbsp;output
            <input id="cfg-maxtokens" type="number" min="1" max="131072" step="256"></label>
        <span id="activity-label"></span>
        <span id="cfg-status"></span>
        <span id="connection-status" class="disconnected">disconnected</span>
    </div>

    <div id="console-root">
        <div id="left-panel">
            <!-- ===== BEGIN chat-ui markup (login/auth/extensions/predict/btw/think removed) ===== -->
            <div id="app" style="display:none">
                <header>
                    <div id="status-bar">
                        <!-- Legacy chat-ui model selector, hidden: the effective model lives in the top
                             header (#cfg-model). Kept in the DOM so chat-ui's app.js model code keeps working. -->
                        <label id="model-label" style="display:none">
                            <select id="model-select"></select>
                            <button id="refresh-models-btn" title="Refresh model list">&#x21bb;</button>
                        </label>
                        <button id="save-chat-btn" title="Save conversation as Markdown">Save Chat</button>
                        <button id="clear-chat-btn" title="Clear the on-screen view only — the model still remembers this conversation">Clear view</button>
                        <button id="new-conversation-btn" title="Start a new conversation — reset the model's memory and begin a new I/O-log session">New conversation</button>
                    </div>
                </header>

                <div id="notification-bar"></div>
                <main id="chat-area">
                    <!-- Messages will be appended here -->
                </main>

                <div id="queue-resize-handle" style="display:none"></div>
                <div id="queue-area" style="display:none"></div>

                <div id="input-resize-handle" title="Drag to resize input area"></div>
                <footer>
                    <div id="input-area" style="position:relative">
                        <textarea id="prompt-input" placeholder="Type a message... (Shift+Enter to send)" rows="5"></textarea>
                        <div id="buttons">
                            <button id="send-btn" title="Send (Shift+Enter)">Send</button>
                            <button id="cancel-btn" title="Cancel" disabled>Cancel</button>
                            <button id="queue-btn" title="Add to queue">Queue</button>
                        </div>
                    </div>
                </footer>
            </div>
            <!-- ===== END chat-ui markup ===== -->
        </div>

        <div id="splitter" title="Drag to resize"></div>

        <div id="right-panel">
            <div id="right-tab-bar">
                <button class="rtab-btn active" data-tab="logdb">Sessions</button>
                <button class="rtab-btn" data-tab="actors">Actors</button>
                <button class="rtab-btn" data-tab="syslog">System Log</button>
                <button class="rtab-btn" data-tab="agentloop">Agent Loop</button>
                <button class="rtab-btn" data-tab="turingwf">Workflow</button>
                <!-- Add new feature tabs here. -->
            </div>

            <div class="rtab-body">
                <section id="tab-actors" class="rtab-content">
                    <div class="tab-toolbar">
                        <button id="actors-refresh" type="button">Refresh</button>
                        <label class="tab-auto"><input type="checkbox" id="actors-auto" checked> Auto</label>
                        <span id="actors-status"></span>
                    </div>
                    <div id="actors-tree"></div>
                </section>

                <section id="tab-logdb" class="rtab-content active">
                    <!-- Sessions: list conversations; expand one to read its turn-by-turn trace inline;
                         clean up. Arbitrary/raw queries are SQL's job. -->
                    <div class="tab-toolbar">
                        <button id="io-refresh" type="button">Refresh</button>
                        <span class="tab-auto" title="Delete sessions older than this many days (the active conversation is never deleted)">older than
                            <input id="io-del-days" type="number" value="30" min="0" max="3650" style="width:4em">d
                            <button id="io-del-old" type="button">Delete old</button>
                        </span>
                        <span id="io-status"></span>
                    </div>
                    <div id="io-sessions"></div>
                </section>

                <section id="tab-syslog" class="rtab-content">
                    <div class="tab-toolbar">
                        <button id="logs-refresh" type="button">Refresh</button>
                        <label class="tab-auto"><input type="checkbox" id="logs-auto" checked> Auto</label>
                        <label class="tab-auto" title="Show this severity and above (filtered by numeric level value)">Level:
                            <select id="logs-level">
                                <option value="" selected>ALL</option>
                                <option value="400">TRACE</option>
                                <option value="500">DEBUG</option>
                                <option value="800">INFO</option>
                                <option value="900">WARN</option>
                                <option value="1000">ERROR</option>
                            </select>
                        </label>
                        <span id="logs-status"></span>
                    </div>
                    <div id="logs-list"></div>
                </section>

                <section id="tab-agentloop" class="rtab-content">
                    <div class="tab-toolbar">
                        <label class="tab-auto">Workflow:
                            <select id="wf-select"></select>
                        </label>
                        <button id="wf-refresh" type="button">Refresh</button>
                        <span id="wf-status"></span>
                    </div>
                    <div id="wf-list"></div>
                </section>

                <section id="tab-turingwf" class="rtab-content">
                    <div class="tab-toolbar">
                        <label class="tab-auto">Workflow:
                            <select id="twf-select"></select>
                        </label>
                        <button id="twf-refresh" type="button">Refresh</button>
                        <label class="tab-auto">Max iter
                            <input id="twf-max-iter" type="number" value="1000000" min="1" step="1000">
                        </label>
                        <label class="tab-auto">Interval (sec)
                            <input id="twf-interval" type="number" value="0" min="0" step="0.1">
                        </label>
                        <span id="twf-status"></span>
                    </div>
                    <div id="twf-body">
                        <div id="twf-form-wrap" style="display:none">
                            <div id="twf-form"></div>
                            <div id="twf-run-bar">
                                <button id="twf-run" type="button">Run</button>
                                <button id="twf-cancel-run" type="button" disabled>Stop</button>
                            </div>
                        </div>
                        <pre id="twf-output"></pre>
                        <div id="twf-wf-list"></div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- chat-ui application script (unchanged), then the shell script. -->
    <script src="app.js?v=47"></script>
    <script src="console.js?v=28"></script>
</body>
</html>

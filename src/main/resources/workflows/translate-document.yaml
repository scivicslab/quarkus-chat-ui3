name: translate-document
description: |
  Faithfully translate a (possibly long) document into Japanese, in parallel.
  chunk (deterministic) -> parallel-map(translate-chunk per chunk) -> join + write.
  Behaviour is customised with Kustomize-style overlays (patch steps by label); labels mark the
  overlay-targetable steps. note describes what each step does.
  Usage:
    java -jar turing-workflow.jar run -w translate-document.yaml -d ~/works/workflow \
      -P in=/abs/in.md -P out=/abs/out.ja.md -m 2000

params:
  in:
    description: "Input document file (absolute path)"
  out:
    description: "Output file for the translation (absolute path)"
  wf.dir:
    description: "Directory holding the sub-workflow (translate-chunk.yaml)"
    default: "/path/to/workflows"

steps:
  - states: ["0", "1"]
    note: "load the deterministic code-doc plugin (chunk / write helpers)"
    actions:
      - actor: loader
        method: loadJar
        arguments: "com.scivicslab.turingworkflow.plugins:plugin-codedoc:1.0.0"

  - states: ["1", "2"]
    note: "create the codedoc actor under ROOT"
    actions:
      - actor: loader
        method: createChild
        arguments: ["ROOT", "codedoc", "com.scivicslab.turingworkflow.plugins.codedoc.CodeDocActor"]

  - states: ["2", "3"]
    label: chunk
    note: "split the document into Markdown-aware chunks -> list:chunks"
    actions:
      - actor: codedoc
        method: chunkFile
        arguments: ["${in}", "list:chunks", 3000]

  - states: ["3", "4"]
    label: translate-parallel
    note: "run translate-chunk over every chunk in parallel -> list:translated"
    actions:
      - actor: parallel-map
        method: run
        arguments: ["${wf.dir}/translate-chunk.yaml", "list:chunks", "list:translated", 6]

  - states: ["4", "5"]
    label: write
    note: "join the translated chunks and write the output file"
    actions:
      - actor: codedoc
        method: writeFileFromList
        arguments: ["${out}", "list:translated"]

  - states: ["5", "end"]
    note: "report the written path"
    actions:
      - actor: out
        method: error
        arguments: "translate-document: wrote ${out}"

  - states: ["!end", "end"]
    note: "safety net: any unexpected state ends the workflow"
    actions:
      - actor: out
        method: error
        arguments: "translate-document: unexpected state"

name: agent-react
description: |
  In-process agent loop (entry B) using the model's NATIVE function calling. think -> act -> observe,
  repeated until the model answers in plain text instead of calling a tool (or the step limit / cancel
  ends it). Branching is by action success: stepExpectingAction succeeds only when the model returned
  tool_calls; otherwise (a text answer) it fails and the engine falls through to finish.

steps:
  - states: ["0", "think"]
    label: start
    actions:
      - actor: agent
        method: start
        arguments: "${user.message}"

  - states: ["think", "act"]
    label: think-action
    note: "one LLM step; succeeds if the model returned native tool_calls"
    actions:
      - actor: agent
        method: stepExpectingAction

  - states: ["think", "end"]
    label: think-final
    note: "step failed = text answer / step limit / cancelled -> finish"
    actions:
      - actor: agent
        method: finish

  - states: ["act", "think"]
    label: run-tool
    note: "execute the tool calls, append the observations, loop back to think"
    actions:
      - actor: agent
        method: runTool

  - states: ["!end", "end"]
    label: catch-all
    actions:
      - actor: out
        method: error
        arguments: "agent loop ended unexpectedly"

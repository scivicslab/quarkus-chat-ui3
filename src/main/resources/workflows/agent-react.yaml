name: agent-react
description: |
  In-process ReAct agent loop (entry B). think -> act -> observe, repeated until the model
  produces a Final Answer (or the step limit / cancel ends it). Branching is by action success:
  stepExpectingAction succeeds only when the model asked for a tool; otherwise it fails and the
  engine falls through to finish.

steps:
  - states: ["0", "think"]
    label: start
    actions:
      - actor: agent
        method: start
        arguments: "${user.message}"

  - states: ["think", "act"]
    label: think-action
    note: "one LLM step; succeeds if the model asked for a tool"
    actions:
      - actor: agent
        method: stepExpectingAction

  - states: ["think", "end"]
    label: think-final
    note: "step failed = final answer / step limit / cancelled -> finish"
    actions:
      - actor: agent
        method: finish

  - states: ["act", "think"]
    label: run-tool
    note: "execute the tool, append the observation, loop back to think"
    actions:
      - actor: agent
        method: runTool

  - states: ["!end", "end"]
    label: catch-all
    actions:
      - actor: out
        method: error
        arguments: "agent loop ended unexpectedly"

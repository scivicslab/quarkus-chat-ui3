quarkus.http.port=18090
quarkus.log.level=INFO

# Expose health at /health (Quarkus default is /q/health)
quarkus.smallrye-health.root-path=/health

# LLM backend: "vllm" (default), "claude", or "codex". Set at launch via -Dchatui3.backend=…
# (the AI workspace launch form passes the chosen value). claude/codex run their CLIs as near-bare
# LLMs (harness minimised); chat-ui3's own tools (read/calc/web_search/…) apply to vLLM only.
chatui3.backend=vllm

# vLLM endpoint — update to the node currently running vLLM.
# Pointed to the 2nd RAG node (5.16) to avoid colliding with office-knowledge-chatbot on 5.17.
chatui3.vllm-base-url=http://192.0.2.10:8000

# Agent loop defaults (used as initial ChatUiConfig values)
# chatui3.model=   ← omit to let vLLM use its default
chatui3.temperature=0.7
chatui3.max-tokens=4096

# Context budget (s_budget): the conversation history sent to the model is trimmed to fit this many
# (estimated) tokens. Raised from the conservative 32768 default toward the model's 131072 window,
# leaving room for output (max-tokens + margin) and estimate error. The token estimate is conservative
# even for Japanese (ContextBudget.CHARS_PER_TOKEN), so 120000 stays safely under the model limit.
chatui3.context-window=120000
